<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="nav">
  <div>Fitness Tracker</div>
  <a href="/logout" class="logout">Logout</a>
</div>

<div class="container">

  <div class="card">
    <h2>Welcome {{session["user"]}}</h2>
    <p class="steps">🚶 Steps Today: {{steps}}</p>
  </div>

  <div class="card">
    <h3>Add Workout</h3>
    <form method="POST">
      <input name="workout" placeholder="Workout type">
      <input name="duration" placeholder="Duration (minutes)">
      <input name="calories" placeholder="Calories burned">
      <input name="notes" placeholder="Notes">
      <button>Add Workout</button>
    </form>
  </div>

  <div class="card">
    <h3>Your Workouts</h3>
    {% for w in workouts %}
      <div class="list-item">
        💪 {{w[2]}} | ⏱ {{w[3]}} min | 🔥 {{w[4]}} cal <br>
        📝 {{w[5]}} <br>
        📅 {{w[6]}}
      </div>
    {% endfor %}
  </div>

  <div class="card">
    <h3>🎯 Goals</h3>
    <form action="/add_goal" method="POST">
      <input name="goal" placeholder="Enter your goal">
      <button>Add Goal</button>
    </form>

    {% for g in goals %}
      <div class="list-item">✔ {{g[2]}}</div>
    {% endfor %}
  </div>

  <div class="card">
    <h3>📈 Calories Chart</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let data = {{ workouts|tojson }};
let calories = data.map(w => w[4]);

new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: calories,
        datasets: [{
            label: "Calories Burned",
            data: calories,
            borderWidth: 2,
            tension: 0.3
        }]
    }
});
</script>
