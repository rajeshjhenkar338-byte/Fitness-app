<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="sidebar">
  <h2>🏋️ Fitness</h2>
  <a href="/download">Download</a>
  <a href="/logout">Logout</a>
</div>

<div class="main">

<div class="card">
<h2>Welcome {{session["user"]}}</h2>
<h3>🚶 Steps: {{steps}}</h3>
</div>

<div class="card">
<h3>🤖 AI Suggestion</h3>
<p>{{suggestion}}</p>
</div>

<div class="card">
<form method="POST">
<input name="workout" placeholder="Workout">
<input name="duration" placeholder="Duration">
<input name="calories" placeholder="Calories">
<input name="notes" placeholder="Notes">
<button>Add</button>
</form>
</div>

<div class="card">
{% for w in workouts %}
<div class="item">
{{w["workout"]}} - {{w["calories"]}} cal
<a href="/edit/{{w["id"]}}">Edit</a>
<a href="/delete/{{w["id"]}}">Delete</a>
</div>
{% endfor %}
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>
let data = {{ workouts|tojson | safe }};

let labels = data.map(w => w.date);
let cal = data.map(w => w.calories);

if (labels.length > 0) {
 new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:labels,datasets:[{label:"Calories",data:cal}]}
 });
}
</script>
