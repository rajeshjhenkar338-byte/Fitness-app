<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="sidebar">
  <h2>🏋️ Fitness</h2>

  <a href="/download">⬇ Download Report</a>
  <a href="/logout">Logout</a>
</div>

<div class="main">

  <!-- Welcome -->
  <div class="card">
    <h2>Welcome {{session["user"]}}</h2>
    <h3>🚶 Steps Today: {{steps}}</h3>
  </div>

  <!-- Add Workout -->
  <div class="card">
    <h3>Add Workout</h3>
    <form method="POST">
      <input name="workout" placeholder="Workout type" required>
      <input name="duration" placeholder="Duration (minutes)" required>
      <input name="calories" placeholder="Calories burned" required>
      <input name="notes" placeholder="Notes">
      <button>Add Workout</button>
    </form>
  </div>

  <!-- Workout List -->
  <div class="card">
    <h3>Your Workouts</h3>

    {% for w in workouts %}
      <div class="item">
        💪 <b>{{w[2]}}</b> |
        🔥 {{w[4]}} cal |
        ⏱ {{w[3]}} min <br>
        📅 {{w[6]}} <br>

        <a href="/edit/{{w[0]}}">✏️ Edit</a> |
        <a href="/delete/{{w[0]}}">❌ Delete</a>
      </div>
    {% endfor %}

  </div>

  <!-- Chart -->
  <div class="card">
    <h3>📈 Calories Progress</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let data = {{ workouts|tojson }};

// Extract data
let labels = data.map(w => w[6]);   // date
let calories = data.map(w => w[4]); // calories

const ctx = document.getElementById("chart").getContext("2d");

// Gradient effect
let gradient = ctx.createLinearGradient(0, 0, 0, 400);
gradient.addColorStop(0, "#00c6ff");
gradient.addColorStop(1, "transparent");

// Create chart
new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Calories Burned Over Time",
      data: calories,
      fill: true,
      backgroundColor: gradient,
      borderColor: "#00c6ff",
      tension: 0.4,
      pointRadius: 5
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: {
          color: "white"
        }
      }
    },
    scales: {
      x: {
        ticks: { color: "white" }
      },
      y: {
        ticks: { color: "white" }
      }
    }
  }
});
</script>
