<link rel="stylesheet" href="/static/style.css">

<div class="topbar">
  <h3>Fitness Tracker</h3>
  <a href="/logout">Logout</a>
</div>

<div class="main">

<h2>Welcome {{session["user"]}}</h2>
<h3>Steps Today: {{steps}}</h3>

<div class="grid">

<div class="card2">
<h3>Add Workout</h3>
<form method="POST">
<input name="workout" placeholder="Workout" required>
<input name="duration" placeholder="Duration" required>
<input name="calories" placeholder="Calories" required>
<input name="notes" placeholder="Notes">
<button>Add</button>
</form>
</div>

<div class="card2">
<h3>Your Workouts</h3>

{% for w in workouts %}
<p>
{{w["workout"]}} - {{w["calories"]}} cal
<a href="/delete/{{w['id']}}">Delete</a>
</p>
{% endfor %}

</div>

</div>

</div>
