<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="sidebar">
  <h2>🏋️ Fitness</h2>
  <a href="/download">Download</a>
  <a href="/logout">Logout</a>
</div>

<div class="main">

<div class="card">
<h2>Welcome {{session["user"]}}</h2>
<h3>🚶 Steps: {{steps}}</h3>
</div>

<div class="card">
<h3>🤖 AI Suggestion</h3>
<p>{{suggestion}}</p>
</div>

<div class="card">
<form method="POST">
<input name="workout" placeholder="Workout">
<input name="duration" placeholder="Duration">
<input name="calories" placeholder="Calories">
<input name="notes" placeholder="Notes">
<button>Add</button>
</form>
</div>

<div class="card">
{% for w in workouts %}
<div class="item">
{{w[2]}} - {{w[4]}} cal
<a href="/edit/{{w[0]}}">Edit</a>
<a href="/delete/{{w[0]}}">Delete</a>
</div>
{% endfor %}
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>
let data={{workouts|tojson}};
let labels=data.map(w=>w[6]);
let cal=data.map(w=>w[4]);

new Chart(document.getElementById("chart"),{
 type:"line",
 data:{labels:labels,datasets:[{label:"Calories",data:cal}]}
});
</script>
