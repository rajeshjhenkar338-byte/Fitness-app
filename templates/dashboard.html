<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="topbar">
  <h3>Fitness Tracker</h3>
  <a href="/logout">Logout</a>
</div>

<div class="main">

<h2>Welcome {{session["user"]}}</h2>
<h3>Steps Today: {{steps}}</h3>

<div class="grid">

<div class="card2">
<h3>Add Workout</h3>

<form method="POST">
<input name="workout" placeholder="Workout" required>

<!-- IMPORTANT FIX -->
<input name="duration" type="number" placeholder="Duration" required>
<input name="calories" type="number" placeholder="Calories" required>

<input name="notes" placeholder="Notes">
<button>Add</button>
</form>

</div>

<div class="card2">
<h3>Your Workouts</h3>

{% for w in workouts %}
<p>
{{w["workout"]}} - {{w["calories"]}} cal
<a href="/delete/{{w['id']}}">Delete</a>
</p>
{% endfor %}

</div>

</div>

<div class="card2" style="margin-top:20px;">
<h3>Calories Chart</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let data = {{ workouts|tojson | safe }};

let labels = data.map(w => w.date);
let calories = data.map(w => w.calories);

if(labels.length > 0){
 new Chart(document.getElementById("chart"), {
   type: 'line',
   data: {
     labels: labels,
     datasets: [{
       label: 'Calories Burned',
       data: calories,
       borderColor: 'blue',
       fill: false
     }]
   }
 });
}
</script>
